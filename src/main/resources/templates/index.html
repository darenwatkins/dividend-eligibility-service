<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dividend Eligibility Engine</title>
    
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.0/font/bootstrap-icons.css}">
    
    <!-- Custom CSS -->
    <style>
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline;
        }
        .htmx-request.htmx-indicator {
            display: inline;
        }
    </style>
</head>
<body class="bg-light">
    <!-- Dark-themed navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Dividend Eligibility Engine | Global Custody</span>
            <button class="btn btn-outline-light btn-sm"
                    hx-get="/rules-reference"
                    hx-target="#rules-modal-container"
                    data-bs-toggle="modal"
                    data-bs-target="#rulesModal">
                <i class="bi bi-info-circle"></i> Show Processing Rules
            </button>
        </div>
    </nav>

    <!-- Main content -->
    <div class="container-fluid mt-4">
        <!-- Navigation Tabs -->
        <ul class="nav nav-tabs" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="declarations-tab" data-bs-toggle="tab" data-bs-target="#declarations-content" type="button" role="tab" aria-controls="declarations-content" aria-selected="true">
                    <i class="bi bi-list-check"></i> Dividend Declarations
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="positions-tab" data-bs-toggle="tab" data-bs-target="#positions-content" type="button" role="tab" aria-controls="positions-content" aria-selected="false">
                    <i class="bi bi-briefcase"></i> Positions
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="mainTabContent">
            <!-- Declarations Tab -->
            <div class="tab-pane fade show active" id="declarations-content" role="tabpanel" aria-labelledby="declarations-tab">
                <div class="row">
                    <!-- Left panel - Declarations -->
                    <div class="col-4">
                        <div class="card">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">Dividend Declarations</h5>
                            </div>
                            <div class="card-body" style="max-height: 80vh; overflow-y: auto;">
                                <div id="declaration-panel"
                                     hx-get="/declarations"
                                     hx-trigger="load"
                                     hx-target="#declaration-panel">
                                    <!-- Declarations will be loaded here -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right panel - Results -->
                    <div class="col-8">
                        <div class="card">
                            <div class="card-header bg-success text-white">
                                <h5 class="mb-0">Eligibility Results</h5>
                            </div>
                            <div class="card-body" style="max-height: 80vh; overflow-y: auto;">
                                <div id="results-panel">
                                    <div class="text-center text-muted mt-5">
                                        <h4>Select a declaration to process</h4>
                                        <p>Choose a dividend declaration from the left panel to view eligibility calculations.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Positions Tab -->
            <div class="tab-pane fade" id="positions-content" role="tabpanel" aria-labelledby="positions-tab">
                <div class="container-fluid">
                    <div id="positions-container"
                         hx-get="/positions"
                         hx-trigger="load"
                         hx-target="#positions-container">
                        <!-- Positions will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading spinner -->
    <div id="spinner" class="htmx-indicator">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    
    <!-- HTMX -->
    <script th:src="@{/webjars/htmx.org/1.9.10/dist/htmx.min.js}"></script>

    <!-- Rules Modal Container -->
    <div id="rules-modal-container"></div>
</body>
</html>
