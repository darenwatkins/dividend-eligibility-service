<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<div th:fragment="declarationList">
    <div th:if="${#lists.isEmpty(declarations)}" class="alert alert-info">
        No dividend declarations available.
    </div>
    
    <div th:each="declaration : ${declarations}" class="card mb-3">
        <div class="card-body">
            <h6 class="card-title" th:text="${declaration.issuerName}">Issuer Name</h6>
            <div class="row">
                <div class="col-12">
                    <p class="card-text mb-1">
                        <strong>ISIN:</strong> <span th:text="${declaration.isin}">ISIN</span>
                    </p>
                    <p class="card-text mb-1">
                        <strong>Dividend:</strong> 
                        <span th:text="${#numbers.formatDecimal(declaration.declaredDividendPerShare, 1, 2)}">0.00</span>
                        <span th:text="${declaration.currency}">EUR</span> per share
                    </p>
                    <p class="card-text mb-1">
                        <strong>Type:</strong> <span th:text="${declaration.dividendType}">ORDINARY</span>
                    </p>
                    <div class="row">
                        <div class="col-md-6 col-12">
                            <small class="text-muted">
                                <strong>Ex-Date:</strong> 
                                <span th:text="${#temporals.format(declaration.exDate, 'yyyy-MM-dd')}">2025-07-14</span>
                            </small>
                        </div>
                        <div class="col-md-6 col-12">
                            <small class="text-muted">
                                <strong>Record:</strong> 
                                <span th:text="${#temporals.format(declaration.recordDate, 'yyyy-MM-dd')}">2025-07-15</span>
                            </small>
                        </div>
                    </div>
                    <div class="row mt-1">
                        <div class="col-12">
                            <small class="text-muted">
                                <strong>Payable:</strong> 
                                <span th:text="${#temporals.format(declaration.payDate, 'yyyy-MM-dd')}">2025-07-22</span>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-3">
                <button class="btn btn-primary btn-sm w-100"
                        th:attr="hx-post='/process/' + ${declaration.declarationId}"
                        hx-target="#results-panel"
                        hx-swap="innerHTML"
                        hx-indicator="#spinner"
                        hx-on="htmx:afterRequest: if(window.innerWidth <= 768) { document.getElementById('results-panel').scrollIntoView({behavior: 'smooth', block: 'start'}); }">
                    <i class="bi bi-play-circle"></i> Process Eligibility
                </button>
            </div>
        </div>
    </div>
</div>

</html>
